version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: vehicleshoot-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  redis:
    image: redis:7-alpine
    container_name: vehicleshoot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    container_name: vehicleshoot-backend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      BASE_URL: http://localhost:3000
      DATABASE_URL: file:./dev.db
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_PUBLIC_ENDPOINT: localhost
      MINIO_PUBLIC_PORT: 9000
      REDIS_URL: redis://redis:6379
      WEBHOOK_URL: http://localhost:3001/webhook
    depends_on:
      - minio
      - redis
    volumes:
      - ./backend:/app
      - ./frontend/dist:/app/frontend/dist:ro
      - /app/node_modules

  ai-worker:
    build: ./ai-worker
    environment:
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      REDIS_URL: redis://redis:6379
      BACKEND_URL: http://backend:3000
    depends_on:
      - minio
      - redis
      - backend
    volumes:
      - ./ai-worker:/app
    deploy:
      replicas: 4

volumes:
  minio_data:
  redis_data:
